<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="My Routine" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)" />
<title>My Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --surface3: #e8e4de;
  --text: #18170f;
  --text2: #5c5a52;
  --text3: #9e9b92;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --accent: #4f6ef7;
  --accent-bg: #edf0ff;
  --accent-text: #2740c8;
  --success: #1a9e65;
  --success-bg: #e4f7ee;
  --success-text: #0c6840;
  --warning: #d97706;
  --warning-bg: #fef3e2;
  --danger: #e53e3e;
  --streak: #f97316;
  --streak-bg: #fff4ed;
  --radius: 12px;
  --radius-lg: 18px;
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Lora', Georgia, serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111111;
    --surface: #1c1c1a;
    --surface2: #242422;
    --surface3: #2e2e2b;
    --text: #f0efe9;
    --text2: #9a9a94;
    --text3: #5a5a56;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #5b92f6;
    --accent-bg: #1a2a4a;
    --accent-text: #93b8fa;
    --success: #2ec67a;
    --success-bg: #0d2e1e;
    --success-text: #5de0a0;
    --warning: #f59e0b;
    --warning-bg: #2a1f0a;
    --danger: #fc6060;
    --streak: #fb923c;
    --streak-bg: #2a1500;
  }
}
[data-theme="dark"] {
  --bg: #111111;
  --surface: #1c1c1a;
  --surface2: #242422;
  --surface3: #2e2e2b;
  --text: #f0efe9;
  --text2: #9a9a94;
  --text3: #5a5a56;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #5b92f6;
  --accent-bg: #1a2a4a;
  --accent-text: #93b8fa;
  --success: #2ec67a;
  --success-bg: #0d2e1e;
  --success-text: #5de0a0;
  --warning: #f59e0b;
  --warning-bg: #2a1f0a;
  --danger: #fc6060;
  --streak: #fb923c;
  --streak-bg: #2a1500;
}
[data-theme="dark"] .contrib-day.p25 { background: #14532d; color: #86efac; }
[data-theme="dark"] .contrib-day.p50 { background: #166534; color: #bbf7d0; }
[data-theme="dark"] .contrib-day.p75 { background: #15803d; color: #dcfce7; }
[data-theme="dark"] .contrib-day.p100 { background: var(--success); color: #fff; }
[data-theme="light"] {
  --bg: #f6f6f4;
  --surface: #ffffff;
  --surface2: #f0efec;
  --surface3: #e8e7e3;
  --text: #1a1a18;
  --text2: #6b6b67;
  --text3: #a0a09b;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --accent: #3b7cf4;
  --accent-bg: #eef3fe;
  --accent-text: #1a4fb5;
  --success: #16a362;
  --success-bg: #e6f7ef;
  --success-text: #0a6b3f;
  --warning: #d97706;
  --warning-bg: #fef3e2;
  --danger: #e53e3e;
  --streak: #f97316;
  --streak-bg: #fff4ed;
}
[data-theme="light"] .btn-delete { background: #fee2e2; color: #dc2626; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-title { font-size: 20px; font-weight: 800; letter-spacing: -0.6px; color: var(--text); }
.streak-pill {
  display: flex; align-items: center; gap: 4px;
  background: var(--streak-bg); color: var(--streak);
  border-radius: 20px; padding: 3px 9px; font-size: 13px; font-weight: 600;
}
.nav-week { display: flex; align-items: center; gap: 6px; }
.nav-btn {
  background: var(--surface2); border: none; border-radius: 8px;
  width: 30px; height: 30px; cursor: pointer; font-size: 15px;
  color: var(--text); display: flex; align-items: center; justify-content: center;
}
.nav-btn:active { opacity: 0.5; }
.week-label { font-size: 12px; color: var(--text2); min-width: 90px; text-align: center; }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 99;
}
.tab {
  flex: 1; padding: 11px 0; font-size: 13px; font-weight: 600;
  color: var(--text3); border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── VIEWS ── */
.view { display: none; padding: 16px 16px calc(90px + var(--safe-bottom)); }
.view.active { display: block; }

/* ── RING ── */
.ring-wrap { display: flex; align-items: center; gap: 18px; margin-bottom: 16px; background: var(--surface); border-radius: var(--radius-lg); padding: 18px; border: 1px solid var(--border); }
.ring-svg { flex-shrink: 0; }
.ring-info { flex: 1; }
.ring-pct { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; color: var(--text); }
.ring-sub { font-size: 13px; color: var(--text3); margin-top: 3px; letter-spacing: 0.01em; }
.ring-msg { font-size: 13px; font-weight: 500; margin-top: 8px; padding: 6px 10px; border-radius: 8px; }
.verse-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 18px;
  margin-bottom: 16px; border-left: 3px solid var(--accent);
}
.verse-text {
  font-size: 18px; color: var(--text); line-height: 1.75;
  font-family: var(--font-serif); font-style: italic; font-weight: 700;
  margin-bottom: 10px; letter-spacing: 0.01em;
}
.verse-ref {
  font-size: 13px; font-weight: 700; color: var(--accent);
  text-align: right; letter-spacing: 0.06em; text-transform: uppercase;
  font-family: var(--font);
}
/* ── COLOR PICKER FLYOUT ── */
.color-flyout {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 14px; z-index: 200;
  display: none; flex-direction: column; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  min-width: 220px;
}
.color-flyout.open { display: flex; }
.color-flyout-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text3); margin-bottom: 2px; }
.accent-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
.accent-swatch {
  width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.accent-swatch:hover { transform: scale(1.1); }
.accent-swatch.sel { border-color: var(--text); transform: scale(1.12); }
.color-picker-wrap { position: relative; }
.palette-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; width: 30px; height: 30px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background 0.15s;
}
.palette-btn:hover { background: var(--surface3); }
.palette-btn:active { opacity: 0.7; }

/* ── NOW CARD ── */
.now-card {
  background: var(--accent); color: #fff;
  border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.now-icon { font-size: 28px; flex-shrink: 0; }
.now-info { flex: 1; }
.now-label { font-size: 10px; font-weight: 700; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.12em; }
.now-name { font-size: 18px; font-weight: 800; margin-top: 2px; letter-spacing: -0.3px; }
.now-time { font-size: 12px; opacity: 0.8; margin-top: 1px; }
.now-check { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.25); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.now-check:active { transform: scale(0.9); }

/* ── SECTION ── */
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; margin-top: 4px; }
.section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
.add-btn { background: var(--accent-bg); color: var(--accent-text); border: none; border-radius: 8px; padding: 5px 12px; font-size: 13px; font-weight: 500; cursor: pointer; }
.add-btn:active { opacity: 0.7; }
.trash-btn { background: transparent; border: 0.5px solid var(--border2); border-radius: 8px; padding: 5px 9px; font-size: 15px; cursor: pointer; color: var(--text2); transition: background 0.15s; }
.trash-btn:hover { background: #fee2e2; }
.trash-btn:active { opacity: 0.6; }
[data-theme="dark"] .trash-btn:hover { background: #3b1010; }

/* ── BLOCKS ── */
.blocks-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 24px; }
.block-item {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 13px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: transform 0.1s, opacity 0.2s, box-shadow 0.1s;
  position: relative; overflow: visible;
}
.block-item:active { transform: scale(0.98); }
.block-item.done { opacity: 0.4; }
.block-item.completing { animation: popIn 0.3s ease; }
.block-item.dragging {
  opacity: 0.5; transform: scale(1.02);
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  z-index: 10; cursor: grabbing;
}
.block-item.drag-over { border-color: var(--accent); border-style: dashed; }
@keyframes popIn {
  0% { transform: scale(1); }
  40% { transform: scale(1.03); }
  100% { transform: scale(1); }
}
.drag-handle {
  color: var(--text3); font-size: 16px; cursor: grab; flex-shrink: 0;
  padding: 2px 2px; touch-action: none; line-height: 1;
  display: flex; flex-direction: column; gap: 2px; align-items: center;
}
.drag-handle:active { cursor: grabbing; }
.drag-handle span { display: block; width: 14px; height: 2px; background: var(--text3); border-radius: 1px; }
.block-emoji { font-size: 20px; flex-shrink: 0; width: 32px; text-align: center; }
.block-info { flex: 1; min-width: 0; }
.block-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
.block-item.done .block-name { text-decoration: line-through; color: var(--text3); }
.block-time { font-size: 13px; color: var(--text2); margin-top: 3px; letter-spacing: 0.01em; font-weight: 700; }
.block-check {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.5px solid var(--border2); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: background 0.2s, border-color 0.2s;
  font-size: 13px; color: transparent;
}
.block-item.done .block-check { background: var(--success); border-color: var(--success); color: #fff; }
/* ── INLINE NOTE ── */
.block-note-row {
  margin-top: 4px; padding: 8px 12px; background: var(--surface2);
  border-radius: 0 0 var(--radius) var(--radius);
  border: 1px solid var(--border); border-top: none;
  font-size: 13px; color: var(--text2); line-height: 1.6;
}
.block-note-bullets { list-style: none; padding: 0; margin: 0; }
.block-note-bullets li { padding: 1px 0; padding-left: 14px; position: relative; }
.block-note-bullets li::before { content: '•'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
/* ── NOTE FIELD IN MODAL ── */
.block-item.overdue { border-color: var(--warning, #d97706); }
.block-item.overdue .block-time { color: var(--warning, #d97706); }
.overdue-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--warning, #d97706); flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}
.note-field-wrap { position: relative; }
.note-field-wrap textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 12px; font-size: 14px;
  color: var(--text); font-family: var(--font); resize: none; min-height: 90px;
  line-height: 1.6;
}
.note-field-wrap textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
.note-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ── DAY SELECTOR ── */
.day-selector { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.day-selector::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0; padding: 7px 10px; border-radius: 14px;
  border: 1px solid var(--border2); background: var(--surface);
  font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer;
  transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 0px;
  min-width: 48px;
}
.day-pill .d-name { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.day-pill .d-num { font-size: 17px; font-weight: 800; line-height: 1.15; letter-spacing: -0.3px; }
.day-pill .d-mon { font-size: 9px; font-weight: 500; color: var(--text3); line-height: 1.2; opacity: 0.8; }
.day-pill .d-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-top: 3px; }
.day-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.day-pill.active .d-name { color: rgba(255,255,255,0.7); }
.day-pill.active .d-mon { color: rgba(255,255,255,0.7); }
.day-pill.active .d-dot { background: rgba(255,255,255,0.8); }
.day-pill.has-perfect .d-dot { background: var(--success); }
.day-pill.active.has-perfect .d-dot { background: #fff; }

/* ── STATS GRID ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border-radius: var(--radius-lg); padding: 14px 16px; border: 1px solid var(--border); }
.stat-val { font-size: 30px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
.stat-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }
.progress-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
.progress-fill.green { background: var(--success); }

/* ── CONTRIBUTION GRAPH ── */
.contrib-wrap { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 20px; }
.contrib-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
.contrib-grid { display: flex; gap: 3px; flex-wrap: wrap; }
.contrib-day {
  width: 28px; height: 28px; border-radius: 6px; background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; color: var(--text3); cursor: default;
  position: relative;
}
.contrib-day.p0 { background: var(--surface2); }
.contrib-day.p25 { background: #bbf7d0; color: #166534; }
.contrib-day.p50 { background: #86efac; color: #166534; }
.contrib-day.p75 { background: #4ade80; color: #166534; }
.contrib-day.p100 { background: var(--success); color: #fff; }
@media (prefers-color-scheme: dark) {
  .contrib-day.p25 { background: #14532d; color: #86efac; }
  .contrib-day.p50 { background: #166534; color: #bbf7d0; }
  .contrib-day.p75 { background: #15803d; color: #dcfce7; }
  .contrib-day.p100 { background: var(--success); color: #fff; }
}

/* ── WEEK ROWS ── */
.week-row {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: transform 0.1s;
}
.week-row:active { transform: scale(0.98); }

/* ── HABITS ── */
.habit-table { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
.habit-head { display: flex; align-items: center; padding: 8px 14px; background: var(--surface2); gap: 10px; }
.habit-head-name { flex: 1; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.habit-day-labels { display: flex; gap: 4px; }
.h-day-lbl { width: 30px; text-align: center; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
.habit-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 10px; }
.habit-row:last-child { border-bottom: none; }
.habit-name { font-size: 14px; font-weight: 500; flex: 1; color: var(--text); }
.habit-days { display: flex; gap: 4px; }
.h-dot {
  width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border2);
  background: var(--surface2); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 600; color: transparent;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.h-dot:active { transform: scale(0.88); }
.h-dot.done { background: var(--success); border-color: var(--success); color: #fff; }
.habit-streak { font-size: 12px; color: var(--streak); font-weight: 600; min-width: 32px; text-align: right; }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed; width: 8px; height: 8px; border-radius: 2px;
  pointer-events: none; z-index: 9999;
  animation: confettiFall 1s ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
}

/* ── TIME PICKER ── */
.time-picker { display: flex; gap: 0; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border2); background: var(--surface2); height: 160px; position: relative; }
.time-picker::before, .time-picker::after {
  content:''; position: absolute; left:0; right:0; height: 52px; pointer-events: none; z-index: 2;
}
.time-picker::before { top:0; background: linear-gradient(to bottom, var(--surface2), transparent); }
.time-picker::after  { bottom:0; background: linear-gradient(to top, var(--surface2), transparent); }
.tp-col { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.tp-col::-webkit-scrollbar { display: none; }
.tp-item {
  height: 44px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 600; color: var(--text2); scroll-snap-align: center;
  cursor: pointer; transition: color 0.15s;
  padding: 0 4px;
}
.tp-item.selected { color: var(--text); }
.tp-item.ampm { font-size: 16px; }
.tp-selector {
  position: absolute; top: 50%; left: 0; right: 0; height: 44px;
  transform: translateY(-50%); border-top: 1.5px solid var(--border2);
  border-bottom: 1.5px solid var(--border2); pointer-events: none; z-index: 1;
}
/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 22px 22px 0 0;
  width: 100%; max-width: 540px;
  padding: 20px 20px calc(20px + var(--safe-bottom));
  max-height: 92dvh; overflow-y: auto; overscroll-behavior: contain;
}
@media (min-width: 600px) {

<script>
// ── CONSTANTS ──────────────────────────────────────────────────
const COLORS = [
  { id:'amber',  light:'#FAEEDA', dot:'#EF9F27' },
  { id:'blue',   light:'#E6F1FB', dot:'#378ADD' },
  { id:'teal',   light:'#E1F5EE', dot:'#1D9E75' },
  { id:'purple', light:'#EEEDFE', dot:'#7F77DD' },
  { id:'coral',  light:'#FAECE7', dot:'#D85A30' },
  { id:'green',  light:'#EAF3DE', dot:'#639922' },
  { id:'pink',   light:'#FBEAF0', dot:'#D4537E' },
  { id:'gray',   light:'#F1EFE8', dot:'#888780' },
];
const EMOJIS = ['☀️','💪','🍳','💼','🧘','🚶','📖','🎯','💤','🥗','🏃','🎨','✍️','🎵','🌙','💧'];

// ── EMOJI PICKER ───────────────────────────────────────────────
let recentEmojis = JSON.parse(localStorage.getItem('recent_emojis')||'[]');

function getEmoji(str) {
  // extract first emoji character from a string
  const seg = [...(str||'')];
  for (const ch of seg) {
    const cp = ch.codePointAt(0);
    if (cp > 0x231a) return ch; // anything above basic latin is likely emoji
  }
  return null;
}

function setEmoji(e) {
  if (!e) return;
  selectedEmoji = e;
  const prev = document.getElementById('emoji-preview');
  if (prev) { prev.textContent = e; prev.classList.add('has-emoji'); }
  recentEmojis = [e, ...recentEmojis.filter(x=>x!==e)].slice(0,16);
  localStorage.setItem('recent_emojis', JSON.stringify(recentEmojis));
  renderEmojiRecents();
}

function onEmojiInput(val) {
  const e = getEmoji(val);
  if (e) {
    setEmoji(e);
    const inp = document.getElementById('emoji-input');
    if (inp) inp.value = '';
  }
}

function openNativeEmoji() {
  const inp = document.getElementById('emoji-input');
  if (inp) { inp.focus(); inp.select(); }
}

function renderEmojiGrid() {
  // update preview with current selectedEmoji
  const prev = document.getElementById('emoji-preview');
  if (prev) prev.textContent = selectedEmoji;
  const inp = document.getElementById('emoji-input');
  if (inp) inp.value = '';
  renderEmojiRecents();
}

function renderEmojiRecents() {
  const wrap = document.getElementById('emoji-recents-wrap');
  const container = document.getElementById('emoji-recents');
  if (!wrap || !container) return;
  const pool = [...new Set([selectedEmoji, ...recentEmojis, ...EMOJIS])].slice(0,16);
  wrap.style.display = pool.length ? 'block' : 'none';
  container.innerHTML = pool.map(e =>
    `<div class="emoji-recent-item ${e===selectedEmoji?'sel':''}" onclick="setEmoji('${e}')">${e}</div>`
  ).join('');
}

function pickEmoji(e) { setEmoji(e); }
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const ROUTINE = [
  { name:'Wake up — no phone', time:'6:45 AM',           color:'amber',  emoji:'☀️', days:[0,1,2,3,4,5,6] },
  { name:'Breakfast',          time:'7:00 AM',           color:'amber',  emoji:'🍳', days:[0,1,2,3,4,5,6] },
  { name:'Work',               time:'9:00 AM – 5:30 PM', color:'blue',   emoji:'💼', days:[1,2,3,4,5] },
  { name:'Shutdown ritual',    time:'5:15 PM',           color:'blue',   emoji:'✍️', days:[1,2,3,4,5] },
  { name:'Workout',            time:'5:45 PM',           color:'teal',   emoji:'💪', days:[1,2,3,4,5] },

function getDailyVerse() {
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  return KJV_VERSES[dayOfYear % KJV_VERSES.length];
}

function loadState() {
  try {
    const r = localStorage.getItem('routine_v2');
    if (r) return JSON.parse(r);
  } catch(e) {}
  return buildDefault();
}

function saveState() {
  try { localStorage.setItem('routine_v2', JSON.stringify(state)); } catch(e) {}
}

function buildDefault() {
  const blocks = {};
  for (let w = -4; w <= 2; w++) {
    getWeekDates(w).forEach(d => {
      const dk = dateKey(d);
      blocks[dk] = ROUTINE
        .filter(r => r.days.includes(d.getDay()))
        .map((r,i) => ({ id:`${dk}-${i}`, name:r.name, time:r.time, color:r.color, emoji:r.emoji, done:false }));
    });
  }
  return { blocks, habits: DEFAULT_HABITS.map((n,i)=>({id:`h${i}`,name:n})), habitDone:{} };
}

// ── DATE UTILS ─────────────────────────────────────────────────
function todayKey() { return dateKey(new Date()); }
function dateKey(d) { return d.toISOString().slice(0,10); }
function getWeekDates(offset) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day===0?6:day-1) + offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function isToday(d) { return dateKey(d)===todayKey(); }
function fmtDate(d) { return d.toLocaleString('default',{month:'short',day:'numeric'}); }
function ensureBlocks(dk, dow) {
  if (!state.blocks[dk]) {
    state.blocks[dk] = ROUTINE.filter(r=>r.days.includes(dow))
      .map((r,i)=>({id:`${dk}-${i}`,name:r.name,time:r.time,color:r.color,emoji:r.emoji,done:false}));
    saveState();
  }
}

// ── STREAK ─────────────────────────────────────────────────────
function calcStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dk = dateKey(d);
    const bl = state.blocks[dk] || [];
    if (!bl.length) { if (i===0) continue; break; }
    const pct = bl.filter(b=>b.done).length / bl.length * 100;
    if (pct >= 80) streak++;
    else if (i > 0) break;
  }
  return streak;
}

// ── CONFETTI ───────────────────────────────────────────────────
function burst(x, y) {
  const colors = ['#3b7cf4','#16a362','#f97316','#d4537e','#7f77dd','#ef9f27'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${x + (Math.random()-0.5)*80}px;
      top:${y}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      transform:rotate(${Math.random()*360}deg);
      animation-duration:${0.7+Math.random()*0.6}s;
      animation-delay:${Math.random()*0.2}s;
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1400);
  }
}

// ── COMPLETION RING SVG ─────────────────────────────────────────
function ringHTML(pct, done, total) {
  const r = 36, c = 2*Math.PI*r;
  const offset = c - (pct/100)*c;
  const color = pct===100?'var(--success)':'var(--accent)';
  const subMsg = pct===100?'Perfect day! 🎉':pct>=75?'Almost there!':pct>=50?'Halfway — keep going':'Let\'s get started';
  return `<div class="ring-wrap">
    <svg class="ring-svg" width="88" height="88" viewBox="0 0 88 88">
      <circle cx="44" cy="44" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="8"/>
      <circle cx="44" cy="44" r="${r}" fill="none" stroke="${color}" stroke-width="8"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}"
        stroke-linecap="round" transform="rotate(-90 44 44)"
        style="transition:stroke-dashoffset 0.6s ease"/>
      <text x="44" y="48" text-anchor="middle" font-size="16" font-weight="800" fill="var(--text)">${pct}%</text>
    </svg>
    <div class="ring-info">
      <div class="ring-pct">${done}/${total}</div>
      <div class="ring-sub">${subMsg}</div>
    </div>
  </div>`;
}

// ── NOW CARD ───────────────────────────────────────────────────
function getNowBlock(blocks) {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const mins = h*60+m;
  function parseTime(t) {
    if (!t) return null;
    const match = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!match) return null;
    let hr = parseInt(match[1]), mn = parseInt(match[2]);
    const pm = match[3].toUpperCase()==='PM';
    if (pm && hr!==12) hr+=12;
    if (!pm && hr===12) hr=0;
    return hr*60+mn;
  }
  const undone = blocks.filter(b=>!b.done);
  for (const b of undone) {
    const t = parseTime(b.time);
    if (t !== null && Math.abs(t - mins) < 120) return b;
  }
  return undone[0] || null;
}

function initTimePicker() {
  const hours  = Array.from({length:12},(_,i)=>i+1);
  const mins   = Array.from({length:12},(_,i)=>i*5);
  const ampms  = ['AM','PM'];

  function buildCol(id, items, selected, fmt) {
    const col = document.getElementById(id);
    col.innerHTML = '<div style="height:58px"></div>' +
      items.map(v=>`<div class="tp-item ${fmt(v)===fmt(selected)?'selected':''}" data-val="${v}">${fmt(v)}</div>`).join('') +
      '<div style="height:58px"></div>';
    // scroll to selected
    const idx = items.indexOf(typeof selected==='number'?selected:items.find(x=>x===selected));
    col.scrollTop = idx * 44;
    col.onscroll = () => onScroll(id, items, fmt);
  }

  function fmt2(n) { return String(n).padStart(2,'0'); }

  buildCol('tp-hour', hours, TP.h, v=>String(v));
  buildCol('tp-min',  mins,  TP.m, fmt2);
  buildCol('tp-ampm', ampms, TP.ampm, v=>v);
  updateTimeDisplay();
}

function onScroll(id, items, fmt) {
  const col = document.getElementById(id);
  const idx = Math.round(col.scrollTop / 44);
  const val = items[Math.max(0, Math.min(idx, items.length-1))];
  if (id==='tp-hour') TP.h = val;
  else if (id==='tp-min') TP.m = val;
  else TP.ampm = val;
  // highlight selected
  col.querySelectorAll('.tp-item').forEach((el,i)=>{
    el.classList.toggle('selected', i===idx);
  });
  updateTimeDisplay();
}

// ── DRAG TO REORDER ───────────────────────────────────────────
function onDragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(()=>{ const el=document.getElementById('bi-'+id); if(el) el.classList.add('dragging'); }, 0);
}
function onDragEnd(e, id) {
  dragSrcId = null;
  document.querySelectorAll('.block-item').forEach(el=>{ el.classList.remove('dragging','drag-over'); });
}
function onDragOver(e, id) {
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.block-item').forEach(el=>el.classList.remove('drag-over'));
  const el=document.getElementById('bi-'+id);
  if (el && id!==dragSrcId) el.classList.add('drag-over');
}
function onDrop(e, targetId) {
  e.preventDefault();
  if (!dragSrcId || dragSrcId===targetId) return;
  const blocks = state.blocks[selectedDay];
  const srcIdx = blocks.findIndex(b=>b.id===dragSrcId);
  const tgtIdx = blocks.findIndex(b=>b.id===targetId);
  if (srcIdx<0||tgtIdx<0) return;
  pushUndo('Reorder undone');
  const [moved] = blocks.splice(srcIdx,1);
  blocks.splice(tgtIdx,0,moved);
  saveState(); render();
  showUndoToast('Order changed');
}

// touch-based drag (mobile)
let touchDragId = null;
let touchClone = null;
let touchStartY = 0;
function onTouchDragStart(e, id) {
  if (selectMode) return;
  touchDragId = id;
  touchStartY = e.touches[0].clientY;
  const src = document.getElementById('bi-'+id);
  if (!src) return;
  touchClone = src.cloneNode(true);
  touchClone.style.cssText = `position:fixed;left:${src.getBoundingClientRect().left}px;top:${src.getBoundingClientRect().top}px;width:${src.offsetWidth}px;opacity:0.85;z-index:999;pointer-events:none;transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.2);border-radius:12px;`;
  document.body.appendChild(touchClone);
  src.style.opacity='0.3';
}
function onTouchDragMove(e, id) {
  if (!touchDragId || !touchClone) return;
  e.preventDefault();
  const dy = e.touches[0].clientY - touchStartY;
  touchClone.style.transform = `translateY(${dy}px) scale(1.02)`;
  // find which block we're hovering
  document.querySelectorAll('.block-item').forEach(el=>el.classList.remove('drag-over'));
  const touch = e.touches[0];
  const els = document.elementsFromPoint(touch.clientX, touch.clientY);
  for (const el of els) {
    if (el.classList.contains('block-item') && el.id !== 'bi-'+touchDragId) {
      el.classList.add('drag-over'); break;
    }
  }
}
function onTouchDragEnd(e, id) {
  if (!touchDragId) return;
  const src = document.getElementById('bi-'+id);
  if (src) src.style.opacity='';
  if (touchClone) { touchClone.remove(); touchClone=null; }
  // find drop target
  const touch = e.changedTouches[0];
  const els = document.elementsFromPoint(touch.clientX, touch.clientY);
  for (const el of els) {
    if (el.classList.contains('block-item') && el.id && el.id !== 'bi-'+touchDragId) {
      const targetId = el.id.replace('bi-','');
      const blocks = state.blocks[selectedDay];
      const srcIdx = blocks.findIndex(b=>b.id===touchDragId);
      const tgtIdx = blocks.findIndex(b=>b.id===targetId);
      if (srcIdx>=0&&tgtIdx>=0) {
        pushUndo('Reorder undone');
        const [moved]=blocks.splice(srcIdx,1);
        blocks.splice(tgtIdx,0,moved);
        saveState();
        showUndoToast('Order changed');
      }
      break;
    }
  }
  document.querySelectorAll('.block-item').forEach(el=>el.classList.remove('drag-over'));
  touchDragId=null; render();
}

// ── UNDO ──────────────────────────────────────────────────────
function snapshotState() {
  return JSON.stringify({ blocks: state.blocks, habits: state.habits, habitDone: state.habitDone });
}

function pushUndo(label) {
  undoStack.push({ label, snapshot: snapshotState() });
  if (undoStack.length > 20) undoStack.shift();
}

function showUndoToast(label) {
  if (undoTimer) clearTimeout(undoTimer);
  if (undoHideTimer) clearTimeout(undoHideTimer);
  const toast = document.getElementById('undo-toast');
  toast.style.display = 'flex';
  toast.className = 'undo-toast';
  toast.innerHTML = `
    <span>${label}</span>
    <button class="undo-btn" onclick="doUndo()">Undo</button>
    <div class="undo-progress" style="animation-duration:${UNDO_DURATION}ms"></div>`;
  undoTimer = setTimeout(() => hideUndoToast(), UNDO_DURATION);
}

function hideUndoToast() {
  const toast = document.getElementById('undo-toast');
  toast.classList.add('hiding');
  undoHideTimer = setTimeout(() => { toast.style.display = 'none'; toast.className = 'undo-toast'; }, 250);
}

function doUndo() {
  if (!undoStack.length) return;
  const { snapshot } = undoStack.pop();
  const prev = JSON.parse(snapshot);
  state.blocks = prev.blocks;
  state.habits = prev.habits;
  state.habitDone = prev.habitDone;
  saveState();
  hideUndoToast();
  render();
}

  const notes = [...editor.querySelectorAll('.bullet-line input')]
    .map(i => i.value.trim()).filter(Boolean);
  const b = (state.blocks[dk] || []).find(x => x.id === id);
  if (b) { b.notes = notes; saveState(); }
  openNoteId = null;
  render();
}

function clearNote(dk, id) {
  const b = (state.blocks[dk] || []).find(x => x.id === id);
  if (b) { pushUndo('Note cleared'); b.notes = []; saveState(); showUndoToast('Note cleared'); }
  openNoteId = null;
  render();
}

function addBulletLine(id, value='', focusNew=true) {
  const editor = document.getElementById('note-editor-' + id);
  if (!editor) return;
  const line = document.createElement('div');
  line.className = 'bullet-line';
  line.innerHTML = `<span class="bullet-line-dot">•</span>
    <input type="text" value="${value.replace(/"/g,'&quot;')}" placeholder="Add a reminder…" />
    <button class="bullet-line-del" onclick="removeBulletLine(this)" tabindex="-1">×</button>`;
  const inp = line.querySelector('input');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addBulletLine(id, '', true);
    } else if (e.key === 'Backspace' && inp.value === '') {
      e.preventDefault();
      const prev = line.previousElementSibling;
      removeBulletLine(line.querySelector('.bullet-line-del'));
      if (prev && prev.classList.contains('bullet-line')) {
        const prevInp = prev.querySelector('input');
        if (prevInp) { prevInp.focus(); prevInp.setSelectionRange(prevInp.value.length, prevInp.value.length); }
      }
    }
  });
  // insert before the add-line button
  const addBtn = editor.querySelector('.note-add-line');
  editor.querySelector('.bullet-editor').insertBefore(line, addBtn);
  if (focusNew) setTimeout(() => inp.focus(), 20);
}

function removeBulletLine(btn) {
  const line = btn.closest('.bullet-line');
  if (!line) return;
  const editor = line.closest('.bullet-editor');
  const lines = editor ? editor.querySelectorAll('.bullet-line') : [];
  if (lines.length <= 1) { line.querySelector('input').value = ''; return; }
  line.remove();
}

function renderBulletEditor(id, notes) {
  const wrap = document.getElementById('note-editor-' + id);
  if (!wrap) return;
  const existing = notes && notes.length ? notes : [''];
  wrap.querySelector('.bullet-editor').innerHTML = existing.map(n =>
    `<div class="bullet-line">
      <span class="bullet-line-dot">•</span>
      <input type="text" value="${n.replace(/"/g,'&quot;')}" placeholder="Add a reminder…" />
      <button class="bullet-line-del" onclick="removeBulletLine(this)" tabindex="-1">×</button>
    </div>`
  ).join('') + `<button class="note-add-line" onclick="addBulletLine('${id}')">+ add bullet</button>`;
  // wire up keyboard events
  wrap.querySelectorAll('.bullet-line input').forEach((inp, i, all) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addBulletLine(id, '', true);
      } else if (e.key === 'Backspace' && inp.value === '') {
        e.preventDefault();
        const line = inp.closest('.bullet-line');
        const prev = line ? line.previousElementSibling : null;
        removeBulletLine(inp.closest('.bullet-line').querySelector('.bullet-line-del'));
        if (prev && prev.classList.contains('bullet-line')) {
          const prevInp = prev.querySelector('input');
          if (prevInp) { prevInp.focus(); prevInp.setSelectionRange(prevInp.value.length, prevInp.value.length); }
        }
      }
    });
  });
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const dates = getWeekDates(weekOffset);
  document.getElementById('week-label').textContent=`${fmtDate(dates[0])} – ${fmtDate(dates[6])}`;
  document.getElementById('streak-pill').textContent=`🔥 ${calcStreak()}`;

  if (activeTab==='day') renderDay(dates);
  if (activeTab==='week') renderWeek(dates);
  if (activeTab==='habits') renderHabits(dates);
  if (activeTab==='progress') renderProgress();
}

function renderDay(dates) {
  // day selector
  document.getElementById('day-selector-wrap').innerHTML=`<div class="day-selector">${
    dates.map(d=>{
      const dk=dateKey(d);
      const bl=state.blocks[dk]||[];
      const perfect=bl.length>0&&bl.every(b=>b.done);
      const mon=d.toLocaleString('default',{month:'short'});
      return `<div class="day-pill ${dk===selectedDay?'active':''} ${perfect?'has-perfect':''}" onclick="selectDay('${dk}')">
        <span class="d-name">${DAYS_SHORT[d.getDay()]}</span>
        <span class="d-num">${d.getDate()}</span>
        <span class="d-mon">${mon}</span>
        <span class="d-dot"></span>
      </div>`;
    }).join('')
  }</div>`;

  const selDate=dates.find(d=>dateKey(d)===selectedDay)||dates[0];
  ensureBlocks(selectedDay, selDate.getDay());
  const blocks=state.blocks[selectedDay]||[];
  const done=blocks.filter(b=>b.done).length;
  const pct=blocks.length?Math.round(done/blocks.length*100):0;

  // ring
  document.getElementById('ring-area').innerHTML=ringHTML(pct,done,blocks.length) + (isToday(selDate) ? verseCardHTML() : '');

  // perfect day banner
  let perfectHTML='';
  if (pct===100&&blocks.length>0) {
    perfectHTML=`<div class="perfect-banner"><div class="pb-title">🎉 Perfect Day!</div><div class="pb-sub">Full routine complete. You showed up for yourself.</div></div>`;
  }

  // now card
  const now=getNowBlock(blocks);
  let nowHTML='';
  if (now && isToday(selDate) && pct<100) {
    const c=COLORS.find(x=>x.id===now.color)||COLORS[0];
    nowHTML=`<div class="now-card" style="background:${c.dot}">
      <div class="now-icon">${now.emoji||'🎯'}</div>
      <div class="now-info">
        <div class="now-label">Up next</div>
        <div class="now-name">${now.name}</div>
        ${now.time?`<div class="now-time">${now.time}</div>`:''}
      </div>
      <button class="now-check" onclick="toggleBlock('${selectedDay}','${now.id}',this.closest('.now-card'))">✓</button>
    </div>`;
  }
  document.getElementById('now-card-area').innerHTML=perfectHTML+nowHTML;

  document.getElementById('day-heading').textContent=
    isToday(selDate)?`Today — ${done}/${blocks.length}`
    :`${DAYS_SHORT[selDate.getDay()]} ${selDate.getMonth()+1}/${selDate.getDate()} — ${done}/${blocks.length}`;

  // show/hide trash + add buttons
  const trashBtn = document.getElementById('trash-btn');
  if (trashBtn) trashBtn.style.display = selectMode ? 'none' : '';

  // select bar
  const selWrap = document.getElementById('select-bar-wrap');
  if (selectMode && blocks.length) {
    const n = selectedBlocks.size;
    const allSel = n === blocks.length;
    selWrap.innerHTML = `<div class="select-bar">
      <div class="select-bar-label">${n === 0 ? 'Tap blocks to select' : `${n} selected`}</div>
      <div class="select-bar-actions">
        <button class="btn-select-all" onclick="${allSel?'exitSelectMode()':'selectAllBlocks()'}">${allSel?'Deselect all':'Select all'}</button>
        <button class="btn-bulk-delete" onclick="deleteSelectedBlocks()" ${n===0?'disabled':''}>🗑 Delete${n>0?` ${n}`:''}</button>
        <button class="btn-cancel-select" onclick="exitSelectMode()">✕ Cancel</button>
      </div>
    </div>`;
  } else {
    selWrap.innerHTML = '';
  }

  document.getElementById('blocks-list').innerHTML=blocks.length
    ? blocks.map(b=>{
        const c=COLORS.find(x=>x.id===b.color)||COLORS[0];
        const isSel = selectedBlocks.has(b.id);
        const hasNotes = b.notes && b.notes.length > 0;
        const noteOpen = openNoteId === b.id;

        if (selectMode) {
          return `<div class="block-item ${isSel?'selected':''}" onclick="toggleBlockSelect('${b.id}')">
            <div class="select-check">${isSel?'✓':''}</div>
            <div class="block-emoji">${b.emoji||'🎯'}</div>
            <div class="block-info">
              <div class="block-name">${b.name}</div>
              ${b.time?`<div class="block-time">${b.time}</div>`:''}
            </div>
          </div>`;
        }

        // bottom radius flattens when note panel or bullet list is showing below
        const hasBottom = hasNotes || noteOpen;
        const blockRadius = hasBottom ? 'var(--radius) var(--radius) 0 0' : 'var(--radius)';

        // overdue: today, not done, has a time that has passed
        let isOverdue = false;
        if (isToday(selDate) && !b.done && b.time) {
          const match = b.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
          if (match) {
            let hr = parseInt(match[1]), mn = parseInt(match[2]);
            const pm = match[3].toUpperCase() === 'PM';
            if (pm && hr !== 12) hr += 12;
            if (!pm && hr === 12) hr = 0;
            const blockMins = hr * 60 + mn;
            const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
            isOverdue = nowMins > blockMins + 15; // 15 min grace
          }
        }

        // bullet note display (when panel is closed but notes exist)
        const bulletHTML = (hasNotes && !noteOpen) ? `<div class="block-note-row">
          <ul class="block-note-bullets">${b.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
        </div>` : '';

        // inline editable note panel
        const notePanelHTML = noteOpen ? `<div class="note-panel">
          <div class="bullet-editor-wrap" id="note-editor-${b.id}">
            <div class="bullet-editor">
              ${(b.notes && b.notes.length ? b.notes : ['']).map(n =>
                `<div class="bullet-line">
                  <span class="bullet-line-dot">•</span>
                  <input type="text" value="${n.replace(/"/g,'&quot;')}" placeholder="Add a reminder…" />
                  <button class="bullet-line-del" onclick="removeBulletLine(this)" tabindex="-1">×</button>
                </div>`
              ).join('')}
              <button class="note-add-line" onclick="addBulletLine('${b.id}')">+ add bullet</button>
            </div>
          </div>
          <div class="note-panel-footer">
            <span class="note-panel-hint">Enter for new bullet • Backspace on empty line to delete</span>
            <div style="display:flex;gap:6px;">
              ${hasNotes?`<button class="note-clear-btn" onclick="clearNote('${selectedDay}','${b.id}')">Clear all</button>`:''}
              <button class="note-save-btn" onclick="saveNote('${selectedDay}','${b.id}')">Save</button>
            </div>
          </div>
        </div>` : '';

        return `<div style="margin-bottom:8px;">
          <div class="block-item ${b.done?'done':''} ${isOverdue?'overdue':''}" id="bi-${b.id}"
            style="border-radius:${blockRadius};margin-bottom:0;"
            draggable="true"
            ondragstart="onDragStart(event,'${b.id}')"
            ondragend="onDragEnd(event,'${b.id}')"
            ondragover="onDragOver(event,'${b.id}')"
            ondrop="onDrop(event,'${b.id}')">
            <div class="drag-handle"
              onclick="event.stopPropagation()"
              ontouchstart="event.stopPropagation();onTouchDragStart(event,'${b.id}')"
              ontouchmove="event.stopPropagation();onTouchDragMove(event,'${b.id}')"
              ontouchend="event.stopPropagation();onTouchDragEnd(event,'${b.id}')">
              <span></span><span></span><span></span>
            </div>
            <div class="block-emoji" onclick="toggleBlock('${selectedDay}','${b.id}',this.closest('.block-item'))">${b.emoji||'🎯'}</div>
            <div class="block-info" onclick="toggleBlock('${selectedDay}','${b.id}',this.closest('.block-item'))">
              <div class="block-name">${b.name}</div>
              ${b.time?`<div class="block-time">${b.time}${isOverdue?' — overdue':''}</div>`:''}
            </div>
            <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:8px;">
              ${isOverdue?'<div class="overdue-dot"></div>':''}
              <button class="note-icon-btn ${hasNotes?'has-note':''}" onclick="event.stopPropagation();toggleNotePanel('${selectedDay}','${b.id}')" title="${noteOpen?'Close note':'Add note'}">📝</button>
              <button class="block-edit-btn" onclick="event.stopPropagation();openEditBlock('${selectedDay}','${b.id}')" title="Edit">✎</button>
              <div class="block-check" style="border-color:${b.done?'':c.dot}" onclick="event.stopPropagation();toggleBlock('${selectedDay}','${b.id}',this.closest('.block-item'))">${b.done?'✓':''}</div>
            </div>
          </div>${bulletHTML}${notePanelHTML}</div>`;
      }).join('')
    : `<div class="empty"><strong>No blocks</strong>Tap + to add your first block.</div>`;
}

function renderWeek(dates) {
  let total=0,done=0,hTotal=0,hDone=0;
  dates.forEach(d=>{ const bl=state.blocks[dateKey(d)]||[]; total+=bl.length; done+=bl.filter(b=>b.done).length; });
  state.habits.forEach(h=>dates.forEach(d=>{ hTotal++; if(state.habitDone[`${h.id}__${dateKey(d)}`]) hDone++; }));
  const pct=total?Math.round(done/total*100):0;
  const hPct=hTotal?Math.round(hDone/hTotal*100):0;

  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card">
      <div class="stat-val">${done}/${total}</div>
      <div class="stat-lbl">Blocks done</div>
      <div class="progress-bar"><div class="progress-fill ${pct>=80?'green':''}" style="width:${pct}%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${pct}%</div>
      <div class="stat-lbl">Completion</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${hDone}/${hTotal}</div>
      <div class="stat-lbl">Habits done</div>
      <div class="progress-bar"><div class="progress-fill ${hPct>=80?'green':''}" style="width:${hPct}%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-val">🔥${calcStreak()}</div>
      <div class="stat-lbl">Day streak</div>

  document.getElementById('week-overview').innerHTML=dates.map(d=>{
    const dk=dateKey(d);

    const dp=bl.length?Math.round(dc/bl.length*100):0;

      </div>
      <div class="score-badge ${cls}">${dp}%</div>
    </div>`;
  }).join('');
}

function renderProgress() {
  // contribution graph — last 28 days
  const days=[];
  for (let i=27;i>=0;i--) { const d=new Date(); d.setDate(d.getDate()-i); days.push(d); }
  const contribHTML=days.map(d=>{
    const dk=dateKey(d);
    const bl=state.blocks[dk]||[];
    const pct=bl.length?Math.round(bl.filter(b=>b.done).length/bl.length*100):0;
    const cls=pct>=100?'p100':pct>=75?'p75':pct>=50?'p50':pct>0?'p25':'p0';
    return `<div class="contrib-day ${cls}" title="${dk}: ${pct}%">${d.getDate()}</div>`;
  }).join('');

  // insights
  const allDays=days.map(d=>({ dk:dateKey(d), dow:d.getDay(), bl:state.blocks[dateKey(d)]||[] }));
  const byDow=[0,1,2,3,4,5,6].map(dow=>{
    const ds=allDays.filter(x=>x.dow===dow&&x.bl.length>0);
    if (!ds.length) return {dow,pct:0,n:0};
    const avg=ds.reduce((s,x)=>s+x.bl.filter(b=>b.done).length/x.bl.length,0)/ds.length*100;
    return {dow,pct:Math.round(avg),n:ds.length};
  });
  const best=byDow.reduce((a,b)=>b.pct>a.pct?b:a,byDow[0]);
  const worst=byDow.filter(d=>d.n>0).reduce((a,b)=>b.pct<a.pct?b:a,byDow.find(d=>d.n>0)||byDow[0]);

  document.getElementById('contrib-area').innerHTML=`
    <div class="contrib-wrap">
      <div class="contrib-title">Last 28 days</div>
      <div class="contrib-grid">${contribHTML}</div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:10px;font-size:11px;color:var(--text3)">
        <div style="width:12px;height:12px;border-radius:3px;background:var(--surface2)"></div> 0%
        <div style="width:12px;height:12px;border-radius:3px;background:#86efac;margin-left:6px"></div> 50%
        <div style="width:12px;height:12px;border-radius:3px;background:var(--success);margin-left:6px"></div> 100%
      </div>
    </div>`;

  document.getElementById('insights-area').innerHTML=`
    <div class="section-title" style="margin-bottom:12px">Insights</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val">🏆</div>
        <div class="stat-lbl">Best day: ${DAYS_SHORT[best.dow]} (${best.pct}%)</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">📈</div>
        <div class="stat-lbl">Focus: ${worst.n>0?DAYS_SHORT[worst.dow]+' needs work':'-'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${calcStreak()}</div>
        <div class="stat-lbl">Current streak 🔥</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${days.filter(d=>{const bl=state.blocks[dateKey(d)]||[];return bl.length>0&&bl.every(b=>b.done);}).length}</div>
        <div class="stat-lbl">Perfect days (28d)</div>
      </div>
    </div>`;
}

let currentAccentIdx = parseInt(localStorage.getItem('accent_idx') || '0');

function applyAccent(idx) {
  currentAccentIdx = idx;
  const p = ACCENT_PALETTES[idx];
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const root = document.documentElement;
  root.style.setProperty('--accent', dark ? p.dark : p.light);
  root.style.setProperty('--accent-bg', p.bg);
  root.style.setProperty('--accent-text', p.text);
  localStorage.setItem('accent_idx', idx);
  renderAccentSwatches();
}

function renderAccentSwatches() {
  const wrap = document.getElementById('accent-swatches');
  if (!wrap) return;
  wrap.innerHTML = ACCENT_PALETTES.map((p, i) =>
    `<div class="accent-swatch ${i===currentAccentIdx?'sel':''}"
      style="background:${p.light};"
      onclick="applyAccent(${i});closeColorFlyout()"
      title="${p.name}"></div>`
  ).join('');
}

function toggleColorFlyout() {
  const fly = document.getElementById('color-flyout');
  if (!fly) return;
  const isOpen = fly.classList.contains('open');
  if (isOpen) { fly.classList.remove('open'); }
  else { renderAccentSwatches(); fly.classList.add('open'); }
}

function closeColorFlyout() {
  const fly = document.getElementById('color-flyout');
  if (fly) fly.classList.remove('open');
}

// close flyout when clicking outside
document.addEventListener('click', e => {
  const wrap = document.querySelector('.color-picker-wrap');
  if (wrap && !wrap.contains(e.target)) closeColorFlyout();
});

// ── THEME ──────────────────────────────────────────────────────
// manualTheme: 'light' | 'dark' | null (null = auto)
let manualTheme = localStorage.getItem('theme_pref') || null;

function isDarkHour() {
  const h = new Date().getHours();
  return h >= 20 || h < 7; // 8 PM – 7 AM
}

function applyTheme() {
  const dark = manualTheme === 'dark' || (!manualTheme && isDarkHour());
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = dark ? '☀️' : '🌙';
}

function toggleTheme() {
  const currentlyDark = document.documentElement.getAttribute('data-theme') === 'dark';
  manualTheme = currentlyDark ? 'light' : 'dark';
  localStorage.setItem('theme_pref', manualTheme);
  applyTheme();
  applyAccent(currentAccentIdx);
}

// auto-switch check every minute — resets manual override only at the auto boundaries
function autoThemeCheck() {
  const h = new Date().getHours(), m = new Date().getMinutes();
  // at exactly 8:00 PM or 7:00 AM, clear manual override and let auto take over
  if ((h === 20 || h === 7) && m === 0) {
    manualTheme = null;
    localStorage.removeItem('theme_pref');
  }
  applyTheme();
}

// ── INIT ───────────────────────────────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(m=>
  m.addEventListener('click',e=>{ if(e.target===m) closeModals(); })
);
applyTheme();
applyAccent(currentAccentIdx);
selectedDay=todayKey();
ensureBlocks(todayKey(), new Date().getDay());
render();

// refresh now-card every minute + auto theme check
setInterval(()=>{ if(activeTab==='day') render(); autoThemeCheck(); }, 60000);
</script>
</body>
</html>
